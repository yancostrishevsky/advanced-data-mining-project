---
# -------------------------------------------------------------
# This file contains the default configuration for the logging
# module used in the global project scope. It defines used loggers,
# handlers and formatters. A concrete logger used by a module should
# be chosen at specific place in the code.
# -------------------------------------------------------------

version: 1

loggers:
  root:
    handlers: [console_hand, file_hand]
    level: NOTSET

handlers:
  console_hand:
    class: logging.StreamHandler
    formatter: console_fmt
    stream: ext://sys.stdout
    level: INFO
  file_hand:
    class: logging.FileHandler
    formatter: default_formatter
    filename: log/default.log # should be replaced by a correct filename before loading the config
    encoding: utf-8
    mode: w
    level: DEBUG

formatters:
  console_fmt:
    format: '[%(asctime)s][%(levelname)s][%(name)s] %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'
    (): _ColorFormatter # should be replaced by a correct type before loading the config
  default_formatter:
    format: '[%(asctime)s][%(levelname)s][%(name)s] %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'
